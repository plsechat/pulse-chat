name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check types
        run: bun run check-types

      - name: Lint
        run: bun run lint

  test:
    name: Run Tests (${{ matrix.shard.name }})
    runs-on: ubuntu-latest

    # Each shard gets its own postgres service container, so cross-file
    # TRUNCATE deadlocks across shards are impossible. Within a shard,
    # bun still runs files in parallel — but the shards are sized so
    # that's a smaller pool. Adding the matrix keeps CI wall-clock
    # close to the slowest shard's runtime instead of the sum of all.
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: lightweight
            paths: src/__tests__ src/db src/utils src/lib src/plugins src/http/__tests__
          - name: dms-federation-e2ee
            paths: src/routers/__tests__/dms.test.ts src/routers/__tests__/dms-federation-dispatch.test.ts src/routers/__tests__/e2ee.test.ts src/routers/__tests__/e2ee-messages.test.ts src/routers/__tests__/federation-membership.test.ts
          - name: accounts
            paths: src/routers/__tests__/users.test.ts src/routers/__tests__/authorization.test.ts src/routers/__tests__/access-control.test.ts src/routers/__tests__/nicknames.test.ts src/routers/__tests__/user-preferences.test.ts src/routers/__tests__/others.test.ts src/routers/__tests__/file-encryption.test.ts src/routers/__tests__/files.test.ts src/routers/__tests__/key-backup-crypto.test.ts src/routers/__tests__/deferred-data.test.ts
          - name: content
            paths: src/routers/__tests__/messages.test.ts src/routers/__tests__/channels.test.ts src/routers/__tests__/categories.test.ts src/routers/__tests__/emojis.test.ts src/routers/__tests__/roles.test.ts src/routers/__tests__/servers.test.ts src/routers/__tests__/invites.test.ts src/routers/__tests__/forums.test.ts

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pulse_test
          POSTGRES_PASSWORD: pulse_test
          POSTGRES_DB: pulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pulse_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://pulse_test:pulse_test@localhost:5432/pulse_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U pulse_test && break
            echo "Waiting for postgres ($i/30)..."
            sleep 2
          done

      - name: Generate Drizzle migrations
        working-directory: apps/server
        run: bun run db:gen

      - name: Run server tests
        working-directory: apps/server
        run: bun test ${{ matrix.shard.paths }}
