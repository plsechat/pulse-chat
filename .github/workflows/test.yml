name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check types
        run: bun run check-types

      - name: Lint
        run: bun run lint

  # Enumerate every server test file so the downstream `test` job can
  # fan out one runner per file. New test files get picked up
  # automatically — no workflow edit needed when the suite grows.
  discover-tests:
    name: Discover test files
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.find.outputs.files }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: find
        name: Enumerate test files
        working-directory: apps/server
        run: |
          files=$(find src -name '*.test.ts' -type f \
            | sort \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "files=$files" >> "$GITHUB_OUTPUT"
          echo "Discovered $(echo "$files" | jq 'length') test files:"
          echo "$files" | jq -r '.[]'

  # One job per test file. Each job provisions its own postgres
  # service container, so cross-file TRUNCATE deadlocks (which bit us
  # at the 4-way-shard level) are impossible. fail-fast disabled so
  # one bad test doesn't cancel the rest of the suite.
  test:
    name: ${{ matrix.test-file }}
    needs: discover-tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        test-file: ${{ fromJSON(needs.discover-tests.outputs.files) }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pulse_test
          POSTGRES_PASSWORD: pulse_test
          POSTGRES_DB: pulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pulse_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://pulse_test:pulse_test@localhost:5432/pulse_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U pulse_test && break
            echo "Waiting for postgres ($i/30)..."
            sleep 2
          done

      - name: Generate Drizzle migrations
        working-directory: apps/server
        run: bun run db:gen

      - name: Run test file
        working-directory: apps/server
        run: bun test ${{ matrix.test-file }}
